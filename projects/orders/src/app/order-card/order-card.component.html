<div class="order-card">
  <lib-info-card label="Customer" [value]="order.customerName"></lib-info-card>
  <lib-info-card label="Total" [value]="order.total.toString()"></lib-info-card>
  <lib-info-card label="Status" [value]="order.status"></lib-info-card>

  <button type="button" (click)="onSelect()">Select</button>
</div>
